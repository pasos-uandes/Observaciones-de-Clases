<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observaciones de clases 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E24B4A; --red-light: #FCEBEB;
    --amber: #EF9F27; --amber-light: #FAEEDA;
    --green: #1D9E75; --green-light: #E1F5EE;
    --blue: #378ADD; --blue-light: #E6F1FB;
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efec;
    --text: #1a1a1a; --text2: #666; --text3: #999;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --radius: 8px; --radius-lg: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .top-bar h1 { font-size: 19px; font-weight: 600; color: var(--blue); display: flex; align-items: center; gap: 8px; }
  .update-time { font-size: 12px; color: var(--text3); }
  .btn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); cursor: pointer; font-family: inherit; }
  .btn:hover { background: var(--bg3); }

  /* Filtro */
  .filter-bar { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 20px; }
  .filter-bar label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }
  .dropdown-wrap { position: relative; }
  .dropdown-btn { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13px; padding: 7px 11px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); min-width: 230px; cursor: pointer; font-family: inherit; }
  .dropdown-btn:hover { border-color: var(--blue); }
  .dropdown-panel { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 100; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); box-shadow: 0 6px 24px rgba(0,0,0,0.12); min-width: 260px; padding: 8px 0 0; }
  .dropdown-panel.open { display: block; }
  .dp-search { padding: 0 10px 6px; }
  .dp-search input { width: 100%; font-size: 12px; padding: 5px 8px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
  .dp-list { max-height: 240px; overflow-y: auto; border-top: 0.5px solid var(--border); }
  .dp-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
  .dp-item:hover { background: var(--bg2); }
  .dp-item input { width: 15px; height: 15px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }
  .dp-item.all-item { font-style: italic; border-bottom: 0.5px solid var(--border); }
  .dp-footer { padding: 8px 10px; border-top: 0.5px solid var(--border); }
  .dp-apply { width: 100%; padding: 7px; border-radius: var(--radius); border: none; background: var(--blue); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }

  /* Panel comprometidas */
  .comp-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 20px; }
  .comp-panel-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .comp-field label { font-size: 11px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comp-field input { width: 100%; font-size: 13px; padding: 6px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-family: inherit; outline: none; }
  .comp-field input:focus { border-color: var(--blue); }

  /* KPIs */
  .section-lbl { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .kpi { background: var(--bg2); border-radius: var(--radius); padding: 13px 15px; }
  .kpi .lbl { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .kpi .val { font-size: 26px; font-weight: 600; line-height: 1.1; }

  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--text2); margin-bottom: 14px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .leg-sq { width: 10px; height: 10px; border-radius: 2px; }

  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 14px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-title { font-size: 15px; font-weight: 500; }
  .card-sub { font-size: 12px; color: var(--text3); }

  /* Barras */
  .bar-section { margin-bottom: 10px; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .stacked { width: 100%; height: 32px; border-radius: 6px; display: flex; overflow: hidden; }
  .stacked-seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; overflow: hidden; white-space: nowrap; }
  .progress { width: 100%; height: 32px; border-radius: 6px; display: flex; overflow: hidden; background: #e0e0da; }
  .progress-done { height: 100%; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #085041; white-space: nowrap; overflow: hidden; }
  .progress-pend { height: 100%; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; }

  .divider { height: 0.5px; background: var(--border); margin: 22px 0; }

  /* Tabla */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 10px; border-bottom: 0.5px solid var(--border); text-align: left; white-space: nowrap; }
  .tbl td { padding: 12px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--bg2); }
  .tbl .pct { text-align: center; font-weight: 600; }
  .tbl .num { text-align: center; color: var(--text3); }
  .school-nm { font-weight: 500; }

  .loading { text-align: center; padding: 60px; color: var(--text2); }
  .spinner { display: inline-flex; gap: 6px; margin-top: 12px; }
  .spinner span { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); animation: pulse 1.2s infinite; }
  .spinner span:nth-child(2) { animation-delay: .2s; }
  .spinner span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .err { background: var(--red-light); border: 1px solid var(--red); border-radius: var(--radius-lg); padding: 18px; color: var(--red); font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 17V11M12 17V7M16 17V13"/>
      </svg>
      Observaciones de clases 2026
    </h1>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="update-time" id="updateTime">—</span>
      <button class="btn" onclick="loadData()">⟳ Actualizar</button>
    </div>
  </div>

  <!-- Filtro -->
  <div class="filter-bar">
    <div>
      <label>Colegio</label>
      <div class="dropdown-wrap" id="ddWrap">
        <button class="dropdown-btn" id="ddBtn" type="button">
          <span id="ddLabel">Todos los colegios</span>
          <span style="opacity:.5;font-size:11px">▼</span>
        </button>
        <div class="dropdown-panel" id="ddPanel">
          <div class="dp-search"><input type="text" placeholder="Buscar..." id="ddSearch"></div>
          <div class="dp-list" id="ddList"></div>
          <div class="dp-footer"><button class="dp-apply" type="button" id="ddApply">Aplicar</button></div>
        </div>
      </div>
    </div>
    <button class="btn" style="align-self:flex-end" onclick="resetAll()">↺ Limpiar</button>
  </div>

  <!-- Panel comprometidas (se muestra solo con 1-7 colegios seleccionados) -->
  <div class="comp-panel" id="compPanel" style="display:none">
    <div class="comp-panel-title">Observaciones comprometidas por colegio</div>
    <div class="comp-grid" id="compGrid"></div>
  </div>

  <!-- Contenido principal -->
  <div id="main">
    <div class="loading"><div>Conectando con Google Sheets...</div><div class="spinner"><span></span><span></span><span></span></div></div>
  </div>

</div>
<script>
const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR12lk1D2Tt53qg9npkj17cXfynq5c7XFY_OprDP3RiCTjav8gjcMC4ad1tVx259EVbI1rSAeYl8EXY/pub?gid=1764730748&single=true&output=csv';

const C = [
  { fill:'#E24B4A', light:'#FCEBEB', txt:'#791F1F', lbl:'Principiante' },
  { fill:'#EF9F27', light:'#FAEEDA', txt:'#633806', lbl:'En desarrollo' },
  { fill:'#1D9E75', light:'#E1F5EE', txt:'#085041', lbl:'Competente' },
  { fill:'#378ADD', light:'#E6F1FB', txt:'#0C447C', lbl:'Destacado' }
];

let schools = [];       // [{name, obs, cats:[p,ed,c,d]}]
let selected = [];      // nombres seleccionados (vacío = todos)
let comp = {};          // {name: n}

// ── CSV ──────────────────────────────────────────────
function parseCSV(txt) {
  const lines = txt.trim().split('\n').filter(Boolean);
  const heads = splitRow(lines[0]).map(h => h.toLowerCase().trim().replace(/\s+/g,' '));
  const map = {}, by = {};
  heads.forEach((h,i) => map[h]=i);
  for (let i=1;i<lines.length;i++) {
    const v = splitRow(lines[i]);
    const name = (v[map['colegio']]||'').trim();
    if (!name) continue;
    const obs  = +((v[map['total observaciones']]||'1').replace(',','.')) || 1;
    const cats = [
      +((v[map['principiante']] ||'0').replace(',','.').replace('%',''))||0,
      +((v[map['en desarrollo']]||'0').replace(',','.').replace('%',''))||0,
      +((v[map['competente']]   ||'0').replace(',','.').replace('%',''))||0,
      +((v[map['destacado']]    ||'0').replace(',','.').replace('%',''))||0
    ];
    if (!by[name]) by[name]={name,obs:0,cats:[0,0,0,0]};
    cats.forEach((x,j)=>by[name].cats[j]+=x*obs);
    by[name].obs+=obs;
  }
  return Object.values(by).sort((a,b)=>a.name.localeCompare(b.name,'es'));
}
function splitRow(r) {
  const out=[];let cur='',q=false;
  for(let i=0;i<r.length;i++){
    if(r[i]==='"'){q=!q;}
    else if(r[i]===','&&!q){out.push(cur.replace(/^"|"$/g,''));cur='';}
    else cur+=r[i];
  }
  out.push(cur.replace(/^"|"$/g,''));return out;
}

// ── Dropdown ─────────────────────────────────────────
const ddBtn   = document.getElementById('ddBtn');
const ddPanel = document.getElementById('ddPanel');
const ddList  = document.getElementById('ddList');
const ddSearch= document.getElementById('ddSearch');
const ddApply = document.getElementById('ddApply');
const ddWrap  = document.getElementById('ddWrap');

ddBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = ddPanel.classList.toggle('open');
  if (open) { ddSearch.value=''; filterList(''); ddSearch.focus(); }
});
ddWrap.addEventListener('click', e => e.stopPropagation());
document.addEventListener('click', () => {
  if (ddPanel.classList.contains('open')) {
    ddPanel.classList.remove('open');
    applySelection();
  }
});
ddSearch.addEventListener('input', () => filterList(ddSearch.value));
ddApply.addEventListener('click', e => {
  e.stopPropagation();
  ddPanel.classList.remove('open');
  applySelection();
});

function filterList(q) {
  ddList.querySelectorAll('.dp-item:not(.all-item)').forEach(el => {
    el.style.display = el.dataset.n.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function buildDropdown() {
  ddList.innerHTML =
    `<label class="dp-item all-item"><input type="checkbox" id="cbAll"> Todos los colegios</label>` +
    schools.map(s =>
      `<label class="dp-item" data-n="${s.name}"><input type="checkbox" class="cb-school" value="${s.name}"> ${s.name}</label>`
    ).join('');
  document.getElementById('cbAll').addEventListener('change', function() {
    ddList.querySelectorAll('.cb-school').forEach(cb => cb.checked = this.checked);
  });
}

function applySelection() {
  const cbs = [...ddList.querySelectorAll('.cb-school')];
  const checked = cbs.filter(cb => cb.checked).map(cb => cb.value);
  const allChecked = checked.length === schools.length;
  selected = (checked.length === 0 || allChecked) ? [] : checked;
  updateDdLabel();
  updateCompPanel();
  renderMain();
}

function updateDdLabel() {
  const lbl = document.getElementById('ddLabel');
  if (selected.length === 0) lbl.textContent = 'Todos los colegios';
  else if (selected.length === 1) lbl.textContent = selected[0];
  else lbl.textContent = `${selected.length} colegios seleccionados`;
}

function resetAll() {
  selected = [];
  comp = {};
  ddList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked=false);
  updateDdLabel();
  updateCompPanel();
  renderMain();
}

// ── Panel comprometidas ───────────────────────────────
function updateCompPanel() {
  const panel = document.getElementById('compPanel');
  const grid  = document.getElementById('compGrid');
  if (selected.length < 1 || selected.length > 7) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  grid.innerHTML = selected.map(name => `
    <div class="comp-field">
      <label title="${name}">${name}</label>
      <input type="number" min="0" placeholder="N° comprometidas"
        value="${comp[name]||''}"
        data-school="${name}">
    </div>`).join('');
  grid.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', function() {
      const n = parseInt(this.value);
      const nm = this.dataset.school;
      if (!isNaN(n) && n > 0) comp[nm] = n;
      else delete comp[nm];
      renderMain();
    });
  });
}

// ── Render ────────────────────────────────────────────
function pct(n,t){ return t?Math.round(n/t*100):0; }

function stackedBar(cats) {
  const t = cats.reduce((a,b)=>a+b,0);
  if (!t) return '<div class="stacked" style="background:#e0e0da"></div>';
  return '<div class="stacked">'+cats.map((v,i)=>{
    const p=(v/t*100).toFixed(1);
    return `<div class="stacked-seg" style="width:${p}%;background:${C[i].fill};color:${C[i].txt}">${parseFloat(p)>=7?Math.round(parseFloat(p))+'%':''}</div>`;
  }).join('')+'</div>';
}

function progressBar(done, total, label) {
  if (!total || total<=0) return '';
  const dp = Math.min(100,(done/total*100));
  const pp = 100-dp;
  return `
    <div class="bar-meta"><span>${label||'Avance observaciones'}</span><span>${done} de ${total} comprometidas</span></div>
    <div class="progress">
      <div class="progress-done" style="width:${dp}%">${dp>=12?Math.round(dp)+'% realizadas':''}</div>
      ${pp>0?`<div class="progress-pend">${pp>=12?Math.round(pp)+'% pendientes':''}</div>`:''}
    </div>`;
}

function renderMain() {
  const list = selected.length>0 ? schools.filter(s=>selected.includes(s.name)) : schools;
  const showComp = selected.length>=1 && selected.length<=7;

  // Totales
  const tc=[0,0,0,0]; let tObs=0;
  list.forEach(s=>{ s.cats.forEach((v,i)=>tc[i]+=v); tObs+=s.obs; });
  const ts=tc.reduce((a,b)=>a+b,0);

  // Avance total
  let tComp=0, tReal=0;
  if (showComp) list.forEach(s=>{ if(comp[s.name]>0){ tComp+=comp[s.name]; tReal+=Math.round(s.obs); }});

  let html = `
    <div class="section-lbl">Resumen general</div>
    <div class="kpi-grid">
      ${C.map((c,i)=>`<div class="kpi" style="background:${c.light}"><div class="lbl">${c.lbl}</div><div class="val" style="color:${c.fill}">${pct(tc[i],ts)}%</div></div>`).join('')}
      <div class="kpi"><div class="lbl">Total observaciones</div><div class="val">${Math.round(tObs)}</div></div>
    </div>
    <div class="legend">${C.map(c=>`<span><span class="leg-sq" style="background:${c.fill}"></span>${c.lbl}</span>`).join('')}</div>
    <div class="card" style="margin-bottom:22px">
      <div class="card-header"><span class="card-title">Distribución total</span><span class="card-sub">${Math.round(tObs)} observaciones</span></div>
      ${showComp && tComp>0 ? `<div class="bar-section">${progressBar(tReal,tComp)}</div>` : ''}
      <div class="bar-section">${stackedBar(tc)}</div>
    </div>
    <div class="divider"></div>
    <div class="section-lbl" style="margin-bottom:12px">Por colegio</div>
    <div class="card" style="overflow-x:auto">
      <table class="tbl">
        <thead><tr>
          <th>Colegio</th><th>Obs.</th>
          ${C.map(c=>`<th style="text-align:center">${c.lbl}</th>`).join('')}
          <th style="min-width:220px">Distribución</th>
        </tr></thead>
        <tbody>`;

  list.sort((a,b)=>{
    const tA=a.cats.reduce((x,y)=>x+y,0), tB=b.cats.reduce((x,y)=>x+y,0);
    return ((b.cats[2]+b.cats[3])/tB||0)-((a.cats[2]+a.cats[3])/tA||0);
  }).forEach(s=>{
    const t=s.cats.reduce((a,b)=>a+b,0);
    const hasC = showComp && comp[s.name]>0;
    html+=`<tr>
      <td><span class="school-nm">${s.name}</span></td>
      <td class="num">${Math.round(s.obs)}</td>
      ${s.cats.map((v,i)=>`<td class="pct" style="color:${C[i].fill}">${pct(v,t)}%</td>`).join('')}
      <td>
        ${hasC?`<div class="bar-section">${progressBar(Math.round(s.obs),comp[s.name])}</div>`:''}
        <div class="bar-section">${stackedBar(s.cats)}</div>
      </td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  document.getElementById('main').innerHTML = html;
}

// ── Carga ─────────────────────────────────────────────
async function loadData() {
  document.getElementById('main').innerHTML = '<div class="loading"><div>Conectando...</div><div class="spinner"><span></span><span></span><span></span></div></div>';
  try {
    const r = await fetch(CSV);
    if (!r.ok) throw new Error('HTTP '+r.status);
    schools = parseCSV(await r.text());
    if (!schools.length) throw new Error('Sin datos');
    selected=[]; comp={};
    buildDropdown();
    updateCompPanel();
    renderMain();
    document.getElementById('updateTime').textContent = 'Actualizado: '+new Date().toLocaleTimeString('es-CL');
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="err"><strong>Error al cargar</strong><br>${e.message}</div>`;
  }
}

loadData();
</script>
</body>
</html>
